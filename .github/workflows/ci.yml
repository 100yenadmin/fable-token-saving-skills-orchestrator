name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  focused-validation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Run focused tests
        run: python3 -m unittest discover -s tests
      - name: Run public docs safety scan
        run: python3 scripts/check_docs.py
